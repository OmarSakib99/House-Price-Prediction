<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML API</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Hind:300,600' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <header>
    <h1>Boston House Price Prediction</h1>
    <p>Enter the neighborhood features below to estimate a median home value.</p>
  </header>

  <main>
    <div class="login">
      <!-- Main Input For Receiving Query to our ML -->
      <form action="{{ url_for('predict') }}" method="post">
        <div class="form-grid">
          <div class="field">
            <label for="CRIM">Per Capita Crime Rate by Town (CRIM)</label>
            <input type="text" id="CRIM" name="Per capita crime rate by town" placeholder="CRIM" required="required" />
          </div>
          <div class="field">
            <label for="ZN">Residential Land Zoned Over 25,000 sq.ft. (ZN)</label>
            <input type="text" id="ZN" name="Proportion of residential land zoned for lots over 25,000 sq.ft." placeholder="ZN" required="required" />
          </div>
          <div class="field">
            <label for="INDUS">Non-Retail Business Acres per Town (INDUS)</label>
            <input type="text" id="INDUS" name="Proportion of non-retail business acres per town" placeholder="INDUS" required="required" />
          </div>
          <div class="field">
            <label for="CHAS">Charles River Dummy Variable (CHAS)</label>
            <input type="text" id="CHAS" name="Charles River dummy variable" placeholder="CHAS" required="required" />
          </div>
          <div class="field">
            <label for="NOX">Nitric Oxides Concentration, ppm (NOX)</label>
            <input type="text" id="NOX" name="Nitric oxides concentration (parts per 10 million)" placeholder="NOX" required="required" />
          </div>
          <div class="field">
            <label for="RM">Average Number of Rooms per Dwelling (RM)</label>
            <input type="text" id="RM" name="Average number of rooms per dwelling" placeholder="RM" required="required" />
          </div>
          <div class="field">
            <label for="Age">Owner-Occupied Units Built Before 1940 (AGE)</label>
            <input type="text" id="Age" name="Proportion of owner-occupied units built prior to 1940" placeholder="Age" required="required" />
          </div>
          <div class="field">
            <label for="DIS">Distance to Boston Employment Centers (DIS)</label>
            <input type="text" id="DIS" name="Weighted distances to five Boston employment centers" placeholder="DIS" required="required" />
          </div>
          <div class="field">
            <label for="RAD">Accessibility to Radial Highways (RAD)</label>
            <input type="text" id="RAD" name="Index of accessibility to radial highways" placeholder="RAD" required="required" />
          </div>
          <div class="field">
            <label for="TAX">Property Tax Rate per $10,000 (TAX)</label>
            <input type="text" id="TAX" name="Full-value property-tax rate per $10,000" placeholder="TAX" required="required" />
          </div>
          <div class="field">
            <label for="PTRATIO">Pupil-Teacher Ratio by Town (PTRATIO)</label>
            <input type="text" id="PTRATIO" name="Pupil-teacher ratio by town" placeholder="PTRATIO" required="required" />
          </div>
          <div class="field">
            <label for="B">Proportion of Black Residents by Town (B)</label>
            <input type="text" id="B" name="Proportion of Black residents by town" placeholder="B" required="required" />
          </div>
          <div class="field">
            <label for="LSTAT">Percentage of Lower Status Population (LSTAT)</label>
            <input type="text" id="LSTAT" name="Percentage of lower status population" placeholder="LSTAT" required="required" />
          </div>
        </div>

        <button type="submit" class="btn-predict">Predict</button>
      </form>

      {% if prediction_text %}
      <div class="prediction-result">{{ prediction_text }}</div>
      {% endif %}
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Boston House Price Prediction &middot; Powered by scikit-learn &amp; Flask</p>
  </footer>

</body>
</html>
